name: Build Windows EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build Electron Windows portable EXE
        run: corepack pnpm run electron:build-win
        env:
          CI: true

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sara-dental-clinic-windows-build
          path: |
            dist/**
